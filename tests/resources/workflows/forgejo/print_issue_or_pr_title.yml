name: Workflow printing the issue or PR title
on:
  pull_request:
    types: [opened]
  issues:
    types: [opened]

jobs:
  print_issue_title:
    runs-on: ubuntu-latest
    steps:
      - name: Print issue title
        if: forgejo.event_name == 'issues'
        run: |
          echo "Issue Title: ${{ forgejo.event.issue.title }}"
  print_pr_title:
    runs-on: ubuntu-latest
    steps:
      - name: Print PR title
        if: forgejo.event_name == 'pull_request'
        run: |
          echo "PR Title: ${{ forgejo.event.pull_request.title }}"
