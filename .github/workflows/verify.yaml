name: Verify

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          npm install

      - name: Run linter, packager, and utils tests
        run: |
          npm run lint:check && npm run prettier:check && npm run package && npm run test:utils

  verify-act:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup act
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/nektos/act/master/install.sh | sudo bash -s -- -b "/usr/bin"
          # Use the micro image to speed up tests: https://nektosact.com/usage/runners.html
          echo "-P ubuntu-latest=node:16-buster-slim" > $HOME/.actrc

      - name: Install dependencies
        run: |
          npm install

      - name: Run act tests
        run: |
          npm run test:act

  verify-forgejo:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup forgejo-runner
        run: |
          export ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          export RUNNER_VERSION=$(curl -X 'GET' https://data.forgejo.org/api/v1/repos/forgejo/runner/releases/latest | jq .name -r | cut -c 2-)
          export FORGEJO_URL="https://code.forgejo.org/forgejo/runner/releases/download/v${RUNNER_VERSION}/forgejo-runner-${RUNNER_VERSION}-linux-${ARCH}"
          wget -O /usr/local/bin/forgejo-runner ${FORGEJO_URL} || curl -o /usr/local/bin/forgejo-runner ${FORGEJO_URL}
          chmod +x /usr/local/bin/forgejo-runner
          # Use the micro image to speed up tests
          echo "-P ubuntu-latest=node:16-buster-slim" > $HOME/.actrc

      - name: Install dependencies
        run: |
          npm install

      - name: Run forgejo tests
        run: |
          npm run test:forgejo
